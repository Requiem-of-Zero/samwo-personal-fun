services:
  nginx:
    image: nginx:stable
    container_name: default-nginx
    ports:
      - "8080:80"
    networks:
      - frontend
      - backend

  pos-app:
    image: default-pos-app:local
    container_name: default-pos-app
    environment:
      NEXT_PUBLIC_APP_NAME: "default-restaurant"
      NEXT_PUBLIC_DEPLOYMENT_ENV: "homelab"
    networks:
      - backend

  postgres:
    image: postgres:17
    container_name: default-postgres
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

    node-exporter:
      image: prom/node-exporter:latest
      container_name: default-node-exporter
      restart: unless-stopped
      ports:
        - "9100:9100"
      pid: host
      volumes:
        - /:/host:ro,rslave
      command:
        - "--path.rootfs=/host"
      networks:
        - backend

networks:
  frontend:
  backend:

volumes:
  postgres-data:
