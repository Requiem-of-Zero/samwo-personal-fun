services:
  nginx:
    image: nginx
    container_name: pos-nginx
    # Publish host port 8080 -> container port 80
    ports:
      - "8080:80"
    # Mount NGINX configs
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    # Start the application container before nginx
    depends_on:
      - pos-app
    # NGINX can see both networks
    networks:
      - frontend-net
      - app-net

  pos-app:
    # Build an image using the Dockerfile
    build:
      context: ./pos-app
      args:
        NEXT_PUBLIC_APP_NAME: Restaurant POS Homelab
        NEXT_PUBLIC_DEPLOYMENT_ENV: docker-compose
        # Build-time placeholders let Next.js import auth/Prisma routes during compilation.
        # Runtime values still come from ./pos-app/.env.production.
        DATABASE_URL: postgresql://pos_user:pos_password@postgres:5432/pos_db
        BETTER_AUTH_URL: http://localhost:8080
        BETTER_AUTH_SECRET: build-time-placeholder-secret-32-chars
    container_name: pos-app
    env_file:
      - ./pos-app/.env.production
    # Runtime configuration
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Only connected to internal application network
    networks:
      - app-net

  postgres:
    image: postgres:17
    # Expose Postgres on the host for local Next.js development with yarn dev.
    # Use 5433 to avoid colliding with any system Postgres on 5432.
    ports:
      - "127.0.0.1:5433:5432"
    # Initialize database creds on first startup
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    # Persist database files outside the container
    # Prevents data loss when containers are recreated
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net

  node-exporter:
    # CPU, memory, disk, and network
    # Prometheus will scrape this service for Linux sys health data
    # Private: no host port published
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - app-net

  blackbox-exporter:
    # Performs uptime and endpoint health checks
    # Prometheus will ask Blockbox to test website/services
    # Private: Prometheus reaches blackbox through docker DNS
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    volumes:
      - ./monitoring/blackbox.yml:/config/blackbox.yml:ro
    command:
      - "--config.file=/config/blackbox.yml"
    networks:
      - app-net

  prometheus:
    # Metrics db
    # Private: Scrapes metrics from node-exporter and stores time-series data
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # Mount Prometheus scrape config into the container
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app-net

  grafana:
    # Dashboard and visualization tool
    # Connects Prometheus and displays metrics as graphs
    # Protected: only Ubuntu localhost, no LAN/public interfaces
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-net

# Network definitions
networks:
  frontend-net:
  app-net:

volumes:
  # Named Docker volume for PostgreSQL data persistence
  postgres-data:
  grafana-data:
