global:
  scrape_interval: 15s

scrape_configs:
  # Prometheus monitors itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Prometheus collects Linux host metrics from node-exporter
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
